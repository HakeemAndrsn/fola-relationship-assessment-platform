[build]
  command = "npm run build"
  publish = ".next"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions]
  directory = "netlify/functions"
  included_files = ["private/**"]

# Secret keys are set via Netlify dashboard environment variables (not committed)
# YOCO_SECRET_KEY and MAILERLITE_API_KEY are configured in Netlify UI
[functions.verify-payment]
  environment = { YOCO_SECRET_KEY = "" }

[functions.mailerlite]
  environment = { MAILERLITE_API_KEY = "" }

# ─── Cache Control & Security Headers ─────────────────────────────────────────
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    CDN-Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "max-age=0, no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
