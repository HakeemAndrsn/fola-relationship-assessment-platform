[build]
  command = "npm run build"
  publish = ".next"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions]
  directory = "netlify/functions"

# Secret keys are set via Netlify dashboard environment variables (not committed)
# YOCO_SECRET_KEY and MAILERLITE_API_KEY are configured in Netlify UI
[functions.verify-payment]
  environment = { YOCO_SECRET_KEY = "" }

[functions.mailerlite]
  environment = { MAILERLITE_API_KEY = "" }

[functions.send-brevo-email]
  environment = { YOCO_SECRET_KEY = "", BREVO_API_KEY = "" }

[functions.yoco-webhook]
  environment = { YOCO_SECRET_KEY = "", YOCO_WEBHOOK_KEY = "", BREVO_API_KEY = "", MAILERLITE_API_KEY = "" }

# ─── Cache Control & Security Headers ─────────────────────────────────────────
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    CDN-Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "max-age=0, no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://payments.yoco.com https://js.yoco.com https://slelguoygbfzlpylpxfs.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://payments.yoco.com https://js.yoco.com; connect-src 'self' https://payments.yoco.com https://slelguoygbfzlpylpxfs.supabase.co; frame-src 'self' https://payments.yoco.com https://js.yoco.com https://drive.google.com; object-src 'none';"

[[headers]]
  for = "/store/delivery-x7k2m9*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

