[build]
  command = "npm run build"
  publish = ".next"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions]
  directory = "netlify/functions"

# Secret keys are set via Netlify dashboard environment variables (not committed)
# YOCO_SECRET_KEY and MAILERLITE_API_KEY are configured in Netlify UI
[functions.verify-payment]
  environment = { YOCO_SECRET_KEY = "" }

[functions.mailerlite]
  environment = { MAILERLITE_API_KEY = "" }
