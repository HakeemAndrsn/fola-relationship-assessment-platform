functionsDirectory = "/Users/fola/fola-relationship-assessment-platform/netlify/functions"
functionsDirectoryOrigin = "config"
headersOrigin = "inline"
redirectsOrigin = "inline"

[build]
publish = "/Users/fola/fola-relationship-assessment-platform/.next"
publishOrigin = "config"
commandOrigin = "config"
command = "npm run build"
functions = "/Users/fola/fola-relationship-assessment-platform/netlify/functions"

[build.environment]

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[images]
remote_images = ["^(?:https:\\/(?:\\/(?!\\.)(?:(?:(?!(?:^|\\/)\\.).)*?)|$))$", "^(?:http:\\/(?:\\/(?!\\.)(?:(?:(?!(?:^|\\/)\\.).)*?)|$))$"]

[functions]

[functions.verify-payment]

[functions.verify-payment.environment]
YOCO_SECRET_KEY = ""

[functions.mailerlite]

[functions.mailerlite.environment]
MAILERLITE_API_KEY = ""

[functions."*"]
included_files = ["private/**", "fola/fola-relationship-assessment-platform/.env", "fola/fola-relationship-assessment-platform/.env.production", "fola/fola-relationship-assessment-platform/.env.local", "fola/fola-relationship-assessment-platform/.env.production.local"]

[[plugins]]
origin = "default"
package = "@netlify/plugin-nextjs"
pinned_version = "5"

[plugins.inputs]

[[headers]]
for = "/"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
CDN-Cache-Control = "public, max-age=0, must-revalidate"
Netlify-CDN-Cache-Control = "max-age=0, no-cache, no-store, must-revalidate"

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/_next/static/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200.0
force = false

[redirects.query]

[redirects.conditions]

[redirects.headers]

[[redirects]]
from = "/_next/image"
to = "/.netlify/images?url=:url&w=:width&q=:quality"
status = 200.0
force = false

[redirects.query]
url = ":url"
w = ":width"
q = ":quality"

[redirects.conditions]

[redirects.headers]

[[redirects]]
from = "/_ipx/*"
to = "/.netlify/images?url=:url&w=:width&q=:quality"
status = 200.0
force = false

[redirects.query]
url = ":url"
w = ":width"
q = ":quality"

[redirects.conditions]

[redirects.headers]