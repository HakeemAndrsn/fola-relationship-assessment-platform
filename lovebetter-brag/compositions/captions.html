<template id="captions-template">
  <div
    data-composition-id="captions"
    data-width="1920"
    data-height="1080"
    data-duration="16"
  >
    <div class="captions-container">
      <div id="caption-box" class="caption-box">
        <span id="caption-text" class="caption-text"></span>
      </div>
    </div>

    <style>
      [data-composition-id="captions"] .captions-container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        padding-bottom: 230px;
        pointer-events: none;
      }

      [data-composition-id="captions"] .caption-box {
        background-color: rgba(0, 0, 0, 0.75);
        padding: 14px 36px;
        border-radius: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-width: 100px;
        max-width: 85%;
        opacity: 0;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      [data-composition-id="captions"] .caption-text {
        color: #f5f0e0;
        font-family: "Inter", sans-serif;
        font-size: 44px;
        font-weight: 600;
        text-align: center;
        line-height: 1.2;
        max-width: 1600px;
        overflow: hidden;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const lines = [
          { text: "4,231 people have taken the LoveBetter assessment.", start: 0.5, end: 3.0 },
          { text: "3,892 relationships transformed.", start: 3.5, end: 5.5 },
          { text: "R600. Know in 30 minutes what takes therapy 6 sessions to uncover.", start: 6.0, end: 9.5 },
          { text: "10 clinical dimensions. Instant PDF report. A clear path forward.", start: 10.0, end: 13.5 },
          { text: "LoveBetter by FOLA. Start at lovebetter.co.za", start: 14.0, end: 16.0 },
        ];

        const tl = gsap.timeline({ paused: true });
        const box = document.querySelector('[data-composition-id="captions"] #caption-box');
        const textEl = document.querySelector('[data-composition-id="captions"] #caption-text');

        lines.forEach((line) => {
          tl.set(box, { visibility: "visible" }, line.start);
          tl.to(
            box,
            {
              opacity: 1,
              duration: 0.15,
              ease: "power2.out",
              onStart: () => {
                textEl.textContent = line.text;
              },
            },
            line.start,
          );

          tl.to(
            box,
            {
              opacity: 0,
              duration: 0.15,
              ease: "power2.in",
            },
            line.end - 0.15,
          );

          tl.set(box, { opacity: 0, visibility: "hidden" }, line.end + 0.05);
        });

        window.__timelines = window.__timelines || {};
        window.__timelines["captions"] = tl;
      })();
    </script>
  </div>
</template>
